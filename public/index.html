<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMax Coding Plan API Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .endpoint-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
        }

        .endpoint-box h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .endpoint-box code {
            display: block;
            background: #e9ecef;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #495057;
            word-break: break-all;
        }

        .config-section {
            background: #fff3cd;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }

        .config-section h3 {
            color: #856404;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .config-section pre {
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.85rem;
            border: 1px solid #ffeeba;
        }

        .test-result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }

        .test-result.success {
            display: block;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .test-result.error {
            display: block;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .test-result pre {
            margin-top: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.85rem;
        }

        .copy-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
        }

        .copy-btn:hover {
            background: #5a6268;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: white;
            opacity: 0.8;
        }

        .footer a {
            color: white;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 MiniMax Coding Plan API Proxy</h1>
            <p>轻松通过 Vercel 代理访问 MiniMax Coding Plan API</p>
        </div>

        <div class="card">
            <h2>配置设置</h2>

            <div class="form-group">
                <label for="apiKey">MiniMax API Key</label>
                <input type="password" id="apiKey" placeholder="输入您的 MiniMax API Key">
            </div>

            <div class="form-group">
                <label for="model">选择模型</label>
                <select id="model">
                    <option value="MiniMax-M2.5">MiniMax-M2.5 (推荐)</option>
                    <option value="MiniMax-M2.1">MiniMax-M2.1</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn" onclick="testConnection()">🧪 测试连接</button>
                <button class="btn" onclick="generateClaudeCodeConfig()">📝 Claude Code 配置</button>
                <button class="btn" onclick="generateCursorConfig()">📝 Cursor 配置</button>
            </div>

            <div id="testResult" class="test-result"></div>
        </div>

        <div class="card">
            <h2>API 端点</h2>

            <div class="endpoint-box">
                <h3>OpenAI 兼容接口</h3>
                <code id="openaiEndpoint">https://your-proxy.vercel.app/v1/chat/completions</code>
                <button class="copy-btn" onclick="copyToClipboard('openaiEndpoint')">复制</button>
            </div>

            <div class="endpoint-box">
                <h3>Anthropic 兼容接口</h3>
                <code id="anthropicEndpoint">https://your-proxy.vercel.app/anthropic/v1/messages</code>
                <button class="copy-btn" onclick="copyToClipboard('anthropicEndpoint')">复制</button>
            </div>
        </div>

        <div class="card" id="configResult" style="display: none;">
            <h2>配置文件</h2>
            <div id="configContent"></div>
            <button class="copy-btn" onclick="copyConfig()">复制配置</button>
        </div>

        <div class="footer">
            <p>
                Powered by <a href="https://vercel.com" target="_blank">Vercel</a> |
                API by <a href="https://platform.minimax.io" target="_blank">MiniMax</a>
            </p>
        </div>
    </div>

    <script>
        // 自动获取当前域名
        const currentDomain = window.location.origin;
        document.getElementById('openaiEndpoint').textContent = `${currentDomain}/v1/chat/completions`;
        document.getElementById('anthropicEndpoint').textContent = `${currentDomain}/anthropic/v1/messages`;

        async function testConnection() {
            const apiKey = document.getElementById('apiKey').value;
            const model = document.getElementById('model').value;
            const resultDiv = document.getElementById('testResult');

            if (!apiKey) {
                showResult('error', '请输入 API Key');
                return;
            }

            resultDiv.className = 'test-result';
            resultDiv.innerHTML = '正在测试连接...';
            resultDiv.style.display = 'block';

            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: 'user', content: 'Say "Connection successful!" in Chinese.' }],
                        max_tokens: 50
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('success', `✅ 连接成功！响应: ${data.choices?.[0]?.message?.content || JSON.stringify(data)}`);
                } else {
                    showResult('error', `❌ 连接失败: ${data.error?.message || JSON.stringify(data)}`);
                }
            } catch (error) {
                showResult('error', `❌ 请求错误: ${error.message}`);
            }
        }

        function showResult(type, message) {
            const resultDiv = document.getElementById('testResult');
            resultDiv.className = `test-result ${type}`;
            resultDiv.innerHTML = `<strong>${type === 'success' ? '测试结果' : '错误信息'}</strong><pre>${message}</pre>`;
        }

        function generateClaudeCodeConfig() {
            const apiKey = document.getElementById('apiKey').value;
            const proxyUrl = window.location.origin;

            if (!apiKey) {
                alert('请先输入 API Key');
                return;
            }

            const config = {
                env: {
                    ANTHROPIC_BASE_URL: `${proxyUrl}/anthropic`,
                    ANTHROPIC_AUTH_TOKEN: apiKey,
                    API_TIMEOUT_MS: "3000000",
                    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: 1,
                    ANTHROPIC_MODEL: "MiniMax-M2.5",
                    ANTHROPIC_SMALL_FAST_MODEL: "MiniMax-M2.5",
                    ANTHROPIC_DEFAULT_SONNET_MODEL: "MiniMax-M2.5",
                    ANTHROPIC_DEFAULT_OPUS_MODEL: "MiniMax-M2.5",
                    ANTHROPIC_DEFAULT_HAIKU_MODEL: "MiniMax-M2.5"
                }
            };

            showConfig('Claude Code 配置 (~/.claude/settings.json)', JSON.stringify(config, null, 2));
        }

        function generateCursorConfig() {
            const apiKey = document.getElementById('apiKey').value;
            const proxyUrl = window.location.origin;

            if (!apiKey) {
                alert('请先输入 API Key');
                return;
            }

            const instructions = `# Cursor AI 配置

## OpenAI 兼容接口配置
1. 打开 Cursor 设置 (Settings → Models)
2. Override OpenAI Base URL: ${proxyUrl}/v1
3. API Key: ${apiKey}
4. 添加自定义模型: MiniMax-M2.5

## 使用方式
在 Cursor 的 AI 对话中，可以选择 MiniMax-M2.5 模型使用 MiniMax 服务。`;

            showConfig('Cursor 配置说明', instructions);
        }

        function showConfig(title, content) {
            const resultDiv = document.getElementById('configResult');
            const contentDiv = document.getElementById('configContent');

            resultDiv.style.display = 'block';
            contentDiv.innerHTML = `<h3 style="margin-bottom: 12px;">${title}</h3><pre>${escapeHtml(content)}</pre>`;

            window.currentConfig = content;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板！');
            });
        }

        function copyConfig() {
            if (window.currentConfig) {
                navigator.clipboard.writeText(window.currentConfig).then(() => {
                    alert('配置已复制到剪贴板！');
                });
            }
        }
    </script>
</body>
</html>
